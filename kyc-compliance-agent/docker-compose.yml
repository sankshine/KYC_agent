version: '3.8'

services:
  kyc-review-agent:
    build: .
    ports:
      - "8001:8001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - PUBSUB_TOPIC_ID=${PUBSUB_TOPIC_ID}
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/kyc_review
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/tmp/sa-key.json
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kyc_review
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
